<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NEXORA PRO</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

/* HEADER */
header{
text-align:center;
padding:20px;
background:#111827;
}

/* MENU */
.menu{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
padding:15px;
background:#0f172a;
position:sticky;
top:0;
z-index:10;
}

.menu button{
background:#2563eb;
border:none;
padding:10px;
border-radius:8px;
color:white;
font-weight:bold;
cursor:pointer;
}

/* SECCIONES */
.section{display:none;padding:20px;}
.section.active{display:block;}

h2{text-align:center;margin:10px 0;}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

/* CARD */
.card{
background:white;
color:black;
border-radius:15px;
padding:10px;
}

/* CARRUSEL */
.slider{position:relative;}
.slider img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
display:none;
}
.slider img.active{display:block;}

.slider button{
position:absolute;
top:50%;
transform:translateY(-50%);
border:none;
background:black;
color:white;
border-radius:50%;
padding:6px;
cursor:pointer;
}
.prev{left:5px;}
.next{right:5px;}

/* BOTON */
.btn{
display:block;
text-align:center;
background:#25D366;
color:white;
padding:10px;
margin-top:10px;
border-radius:8px;
font-weight:bold;
text-decoration:none;
}

.top{
position:fixed;
bottom:20px;
right:20px;
background:#2563eb;
color:white;
border:none;
padding:10px;
border-radius:50%;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>NEXORA PRO 🛍️</h1>
<p>Tienda completa profesional</p>
</header>

<!-- MENU -->
<div class="menu">
<button onclick="openCat('sudaderas')">Sudaderas</button>
<button onclick="openCat('camisas')">Camisas</button>
<button onclick="openCat('shorts')">Shorts</button>
<button onclick="openCat('perfumes')">Perfumes</button>
<button onclick="openCat('gorras')">Gorras</button>
<button onclick="openCat('tenis')">Tenis</button>
<button onclick="openCat('originales')">Originales</button>
</div>

<script>
function openCat(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
window.scrollTo({top:0,behavior:"smooth"});
}
</script>

<!-- ====================== FUNCION PRODUCTO ====================== -->
<script>
function productCard(cat, n){
return `
<div class="card">
  <div class="slider">
    <button class="prev">◀</button>

    <img class="active" src="${cat}${n}-1.png">
    <img src="${cat}${n}-2.png">
    <img src="${cat}${n}-3.png">

    <button class="next">▶</button>
  </div>

  <h3>${cat.toUpperCase()} Producto ${n}</h3>
  <p>$999 MXN</p>
  <a class="btn pedir">Pedir</a>
</div>
`;
}
</script>

<!-- ====================== SUDADERAS ====================== -->
<div id="sudaderas" class="section active">
<h2>Sudaderas</h2>
<div class="grid" id="sudaderasGrid"></div>
</div>

<!-- ====================== CAMISAS ====================== -->
<div id="camisas" class="section">
<h2>Camisas</h2>
<div class="grid" id="camisasGrid"></div>
</div>

<!-- ====================== SHORTS ====================== -->
<div id="shorts" class="section">
<h2>Shorts</h2>
<div class="grid" id="shortsGrid"></div>
</div>

<!-- ====================== PERFUMES ====================== -->
<div id="perfumes" class="section">
<h2>Perfumes</h2>
<div class="grid" id="perfumesGrid"></div>
</div>

<!-- ====================== GORRAS ====================== -->
<div id="gorras" class="section">
<h2>Gorras</h2>
<div class="grid" id="gorrasGrid"></div>
</div>

<!-- ====================== TENIS ====================== -->
<div id="tenis" class="section">
<h2>Tenis</h2>
<div class="grid" id="tenisGrid"></div>
</div>

<!-- ====================== ORIGINALES ====================== -->
<div id="originales" class="section">
<h2>Originales</h2>
<div class="grid" id="originalesGrid"></div>
</div>

<!-- BOTON TOP -->
<button class="top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
const categories = ["sudaderas","camisas","shorts","perfumes","gorras","tenis","originales"];

// CREAR 10 PRODUCTOS POR CATEGORÍA
categories.forEach(cat=>{
  let grid = document.getElementById(cat+"Grid");
  let html = "";

  for(let i=1;i<=10;i++){
    html += productCard(cat,i);
  }

  grid.innerHTML = html;
});


// WHATSAPP + CARRUSEL
document.addEventListener("click", function(e){

// WHATSAPP
if(e.target.classList.contains("pedir")){
  let card = e.target.closest(".card");
  let name = card.querySelector("h3").innerText;

  window.open(
    `https://wa.me/523329166067?text=${encodeURIComponent("Hola quiero el " + name)}`
  );
}

// NEXT
if(e.target.classList.contains("next")){
  let slider = e.target.closest(".slider");
  let imgs = slider.querySelectorAll("img");

  let active = [...imgs].findIndex(i=>i.classList.contains("active"));
  imgs[active].classList.remove("active");
  imgs[(active+1)%imgs.length].classList.add("active");
}

// PREV
if(e.target.classList.contains("prev")){
  let slider = e.target.closest(".slider");
  let imgs = slider.querySelectorAll("img");

  let active = [...imgs].findIndex(i=>i.classList.contains("active"));
  imgs[active].classList.remove("active");

  let newIndex = active-1;
  if(newIndex<0)newIndex=imgs.length-1;

  imgs[newIndex].classList.add("active");
}

});
</script>

</body>
</html>
